<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration & Login Form</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .form-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .toggle-form {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .toggle-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #777;
            position: relative;
            outline: none;
        }
        
        .toggle-btn.active {
            color: #2c3e50;
        }
        
        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #3498db;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
        }
        
        .form-group .requirements {
            font-size: 12px;
            color: #777;
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #2980b9;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #777;
        }
        
        .form-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .hidden {
            display: none;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .success-message {
            color: #2ecc71;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>Welcome</h1>
            <p>Please register or login to continue</p>
        </div>
        
        <div class="toggle-form">
            <button class="toggle-btn active" id="login-toggle">Login</button>
            <button class="toggle-btn" id="register-toggle">Register</button>
        </div>
        
        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn">Login</button>
            </div>
            
            <div class="form-footer">
                Don't have an account? <a href="#" id="show-register">Register here</a>
            </div>
            
            <div id="login-error" class="error-message hidden"></div>
            <div id="login-success" class="success-message hidden"></div>
        </form>
        
        <!-- Registration Form -->
        <form id="register-form" class="hidden">
            <div class="form-group">
                <label for="register-name">Full Name</label>
                <input type="text" id="register-name" required>
            </div>
            
            <div class="form-group">
                <label for="register-email">Email Address</label>
                <input type="email" id="register-email" required>
                <p class="requirements">Must be a valid email address</p>
            </div>
            
            <div class="form-group">
                <label for="register-phone">Phone Number</label>
                <input type="tel" id="register-phone" required>
                <p class="requirements">Format: +256XXXXXXXXX</p>
            </div>
            
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" required>
                <p class="requirements">Minimum 8 characters, at least one uppercase letter, one number</p>
            </div>
            
            <div class="form-group">
                <label for="register-confirm">Confirm Password</label>
                <input type="password" id="register-confirm" required>
            </div>
            
            <div class="form-group">
                <label for="register-dob">Date of Birth</label>
                <input type="date" id="register-dob" required>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="register-terms" required>
                    I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn">Register</button>
            </div>
            
            <div class="form-footer">
                Already have an account? <a href="#" id="show-login">Login here</a>
            </div>
            
            <div id="register-error" class="error-message hidden"></div>
            <div id="register-success" class="success-message hidden"></div>
        </form>
    </div>

    <script>
        // Toggle between login and register forms
        const loginToggle = document.getElementById('login-toggle');
        const registerToggle = document.getElementById('register-toggle');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegister = document.getElementById('show-register');
        const showLogin = document.getElementById('show-login');
        
        function showLoginForm() {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            loginToggle.classList.add('active');
            registerToggle.classList.remove('active');
        }
        
        function showRegisterForm() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            loginToggle.classList.remove('active');
            registerToggle.classList.add('active');
        }
        
        loginToggle.addEventListener('click', showLoginForm);
        registerToggle.addEventListener('click', showRegisterForm);
        showRegister.addEventListener('click', function(e) {
            e.preventDefault();
            showRegisterForm();
        });
        showLogin.addEventListener('click', function(e) {
            e.preventDefault();
            showLoginForm();
        });
        
        // Form validation and submission
        const loginFormEl = document.getElementById('login-form');
        const registerFormEl = document.getElementById('register-form');
        const loginError = document.getElementById('login-error');
        const loginSuccess = document.getElementById('login-success');
        const registerError = document.getElementById('register-error');
        const registerSuccess = document.getElementById('register-success');
        
        // Simple validation for login
        loginFormEl.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            // Clear previous messages
            loginError.classList.add('hidden');
            loginSuccess.classList.add('hidden');
            
            // Simple validation
            if (!email || !password) {
                loginError.textContent = 'Please fill in all fields';
                loginError.classList.remove('hidden');
                return;
            }
            
            // In a real app, you would send this to your server
            console.log('Login attempt with:', email, password);
            
            // Show success message (simulating successful login)
            loginSuccess.textContent = 'Login successful! Redirecting...';
            loginSuccess.classList.remove('hidden');
            
            // In a real app, you would redirect after successful login
            // setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        });
        
        // Validation for registration
        registerFormEl.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm').value;
            const dob = document.getElementById('register-dob').value;
            const terms = document.getElementById('register-terms').checked;
            
            // Clear previous messages
            registerError.classList.add('hidden');
            registerSuccess.classList.add('hidden');
            
            // Validate all fields are filled
            if (!name || !email || !phone || !password || !confirmPassword || !dob) {
                registerError.textContent = 'Please fill in all required fields';
                registerError.classList.remove('hidden');
                return;
            }
            
            // Validate terms checkbox
            if (!terms) {
                registerError.textContent = 'You must agree to the terms and conditions';
                registerError.classList.remove('hidden');
                return;
            }
            
            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                registerError.textContent = 'Please enter a valid email address';
                registerError.classList.remove('hidden');
                return;
            }
            
            // Validate phone format for Uganda (+256XXXXXXXXX)
            const phoneRegex = /^\+256\d{9}$/;
            if (!phoneRegex.test(phone)) {
                registerError.textContent = 'Please enter a valid Ugandan phone number (+256XXXXXXXXX)';
                registerError.classList.remove('hidden');
                return;
            }
            
            // Validate password strength
            const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(password)) {
                registerError.textContent = 'Password must be at least 8 characters with one uppercase letter and one number';
                registerError.classList.remove('hidden');
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                registerError.textContent = 'Passwords do not match';
                registerError.classList.remove('hidden');
                return;
            }
            
            // Validate age (at least 13 years old)
            const dobDate = new Date(dob);
            const today = new Date();
            const age = today.getFullYear() - dobDate.getFullYear();
            const monthDiff = today.getMonth() - dobDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dobDate.getDate())) {
                age--;
            }
            
            if (age < 13) {
                registerError.textContent = 'You must be at least 13 years old to register';
                registerError.classList.remove('hidden');
                return;
            }
            
            // In a real app, you would send this to your server
            const userData = {
                name,
                email,
                phone,
                password,
                dob
            };
            
            console.log('Registration data:', userData);
            
            // Show success message
            registerSuccess.textContent = 'Registration successful! You can now login.';
            registerSuccess.classList.remove('hidden');
            
            // Clear form
            registerFormEl.reset();
            
            // Optionally switch to login form
            setTimeout(showLoginForm, 2000);
        });
        
        // Set max date for date of birth (13 years ago)
        const dobInput = document.getElementById('register-dob');
        const today = new Date();
        const maxDate = new Date();
        maxDate.setFullYear(today.getFullYear() - 13);
        dobInput.max = maxDate.toISOString().split('T')[0];
    </script>
</body>
</html>
